name: Deploy infra/main.bicep

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment parameter set'
        required: true
        default: production
        type: choice
        options:
          - test
          - production

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: OLI-it.Web
  AZURE_LOCATION: westeurope
  TEMPLATE_FILE: infra/main.bicep

jobs:
  deploy-test:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test')
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      PARAMETERS_FILE: infra/main.test.bicepparam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure OIDC variables
        shell: bash
        run: |
          missing=()
          [ -z "${AZURE_CLIENT_ID}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${AZURE_TENANT_ID}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${AZURE_SUBSCRIPTION_ID}" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

          echo "Azure OIDC variables are present."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (Test)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --name "infra-test-${{ github.run_number }}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --template-file "${TEMPLATE_FILE}" \
              --parameters "${PARAMETERS_FILE}"

  deploy-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      PARAMETERS_FILE: infra/main.prod.bicepparam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure OIDC variables
        shell: bash
        run: |
          missing=()
          [ -z "${AZURE_CLIENT_ID}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${AZURE_TENANT_ID}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${AZURE_SUBSCRIPTION_ID}" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

          echo "Azure OIDC variables are present."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (Production)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --name "infra-prod-${{ github.run_number }}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --template-file "${TEMPLATE_FILE}" \
              --parameters "${PARAMETERS_FILE}"