name: Deploy infra/main.bicep

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: OLI-it.Web
  AZURE_LOCATION: westeurope
  TEMPLATE_FILE: infra/main.bicep
  PARAMETERS_FILE: infra/main.bicepparam

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure OIDC variables
        shell: bash
        run: |
          missing=()
          [ -z "${AZURE_CLIENT_ID}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${AZURE_TENANT_ID}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${AZURE_SUBSCRIPTION_ID}" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

          echo "Azure OIDC variables are present."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --name "infra-${{ github.run_number }}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --template-file "${TEMPLATE_FILE}" \
              --parameters "${PARAMETERS_FILE}"