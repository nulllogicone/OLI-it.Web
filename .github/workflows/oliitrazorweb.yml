name: Deploy Web App oliitrazorweb
on:
  push:
    branches:
    - '**'
    paths:
    - 'OLI-it.Web/**'
    - 'docs/**'
    - '.github/prompts/**'
    - '.github/workflows/oliitrazorweb.yml'
  pull_request:
    branches:
    - '**'
    paths:
    - 'OLI-it.Web/**'
    - 'docs/**'
    - '.github/prompts/**'
    - '.github/workflows/oliitrazorweb.yml'
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
env:
  AZURE_WEBAPP_NAME: oliitrazorweb
  AZURE_WEBAPP_PACKAGE_PATH: OLI-it.Web\published
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 10.0.x
  WORKING_DIRECTORY: OLI-it.Web
  AZURE_RESOURCE_GROUP: OLI-it.Web
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Test
      run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build
    - name: Generate stakeholder dashboard for deployment
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path ".\OLI-it.Web\wwwroot\dashboard" -Force | Out-Null
        pwsh -File ".\docs\generate-dashboard.ps1" -OutputPath ".\OLI-it.Web\wwwroot\dashboard\index.html"
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy-test:
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: test
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Validate Azure OIDC variables
      shell: pwsh
      run: |
        $missing = @()
        if ([string]::IsNullOrWhiteSpace("${{ env.AZURE_CLIENT_ID }}")) { $missing += "AZURE_CLIENT_ID" }
        if ([string]::IsNullOrWhiteSpace("${{ env.AZURE_TENANT_ID }}")) { $missing += "AZURE_TENANT_ID" }
        if ([string]::IsNullOrWhiteSpace("${{ env.AZURE_SUBSCRIPTION_ID }}")) { $missing += "AZURE_SUBSCRIPTION_ID" }

        if ($missing.Count -gt 0) {
          Write-Host "Missing required GitHub Actions variables: $($missing -join ', ')"
          exit 1
        }

        Write-Host "Azure OIDC variables are present."
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
    - name: Deploy to test slot
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: test
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
    - name: Deploy to production
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
